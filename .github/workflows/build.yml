name: Build Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: |
          mkdir -p src-tauri/resources/models
          if [ ! -f src-tauri/resources/models/mobileclip_s2.onnx ]; then
            echo "Downloading models from release..."
            curl -L -o /tmp/models.tar.gz "https://github.com/IceNardus/photofinder-next/releases/download/v0.1.0-models/models.tar.gz"
            tar -xzf /tmp/models.tar.gz -C src-tauri/resources/
            echo "Models downloaded successfully"
          fi
      - name: Install dependencies
        run: |
          brew install pkg-config faudio
          npm install
          cargo install tauri-cli --locked
      - name: Build
        run: |
          npm run build
          cargo tauri build --bundles dmg,app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        shell: bash
        run: |
          mkdir -p src-tauri/resources/models
          if [ ! -f src-tauri/resources/models/mobileclip_s2.onnx ]; then
            echo "Downloading models from release..."
            curl -L -o /tmp/models.tar.gz "https://github.com/IceNardus/photofinder-next/releases/download/v0.1.0-models/models.tar.gz"
            tar -xzf /tmp/models.tar.gz -C src-tauri/resources/
            echo "Models downloaded successfully"
          fi
      - name: Install dependencies
        run: |
          npm install
          cargo install tauri-cli --locked
      - name: Build
        run: |
          npm run build
          cargo tauri build --bundles nsis,msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi