name: Build Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: |
          mkdir -p src-tauri/resources/models
          if [ ! -f src-tauri/resources/models/mobileclip_s2.onnx ]; then
            curl -L "${{ secrets.MODELS_URL }}" -o /tmp/models.tar.gz || echo "Models download skipped"
            tar -xzf /tmp/models.tar.gz -C src-tauri/resources/ 2>/dev/null || echo "Extraction skipped"
          fi
      - name: Install dependencies
        run: |
          brew install pkg-config faudio
          npm install
          cargo install tauri-cli --locked
      - name: Build
        run: |
          npm run build
          cargo tauri build --bundles dmg,app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/release/bundle/dmg/*.dmg
          path: src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: |
          mkdir -p src-tauri/resources\models
          if not exist src-tauri\resources\models\mobileclip_s2.onnx (
            curl -L "%MODELS_URL%" -o models.tar.gz
            tar -xzf models.tar.gz -C src-tauri\resources\ || exit 0
          )
      - name: Install dependencies
        run: |
          npm install
          cargo install tauri-cli --locked
      - name: Build
        run: |
          npm run build
          cargo tauri build --bundles nsis,msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/nsis/*.exe
          path: src-tauri/target/release/bundle/msi/*.msi